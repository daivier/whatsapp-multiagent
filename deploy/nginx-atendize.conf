# Landing / site institucional do SaaS — atendize.com + www.atendize.com
# Servido de /home/daivier/whatsapp-multiagent/landing, /api/ -> control-plane (porta 4500).
# Usa o certificado wildcard *.atendize.com emitido via certbot dns-cloudflare.

server {
    listen 80;
    server_name atendize.com www.atendize.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name atendize.com www.atendize.com;

    ssl_certificate     /etc/letsencrypt/live/atendize.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atendize.com/privkey.pem;

    root /home/daivier/whatsapp-multiagent/landing;
    index index.html;

    client_max_body_size 10m;

    # Control plane (signup + pagamento Mercado Pago)
    location /api/ {
        proxy_pass http://localhost:4500/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html { add_header Cache-Control "no-cache"; }
}
